name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs of the same branch/PR — pushes during a build are
# common and the second one supersedes the first.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + wasm + wrangler dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust toolchain. `rust-toolchain.toml` pins channel + target.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Swatinem/rust-cache caches ~/.cargo and target/ with smarter
      # invalidation than actions/cache (per-crate, prunes stale artifacts,
      # keyed off Cargo.lock + rustc version automatically). The wasm
      # release build is the slowest step, so this is what matters.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: true

      # wasm-pack ships a stale wasm-opt; we use the system one. Install
      # binaryen so build-wasm.mjs can find it (matches local setup).
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      # Prebuilt binary instead of `cargo install` — saves minutes by
      # skipping a from-source build of wasm-pack on every run.
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - uses: actions/setup-node@v4
        with:
          # wrangler 4.x requires Node 22+
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build WASM
        run: npm run build:wasm

      - name: TypeScript typecheck
        run: npm run typecheck

      # vitest runs inside workerd via @cloudflare/vitest-pool-workers, so it
      # depends on the WASM artifacts built in the step above. The `test`
      # script itself is just `vitest run` — no implicit rebuild.
      - name: Unit tests (vitest)
        run: npm test

      # wrangler deploy --dry-run doubles as a bundle-size / config sanity
      # check; it fails the build on missing bindings, oversized payload,
      # or syntax errors the typecheck wouldn't catch (e.g. asset rules).
      - name: Wrangler dry-run
        run: npx wrangler deploy --dry-run --outdir dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'dry-run-noop' }}

  cargo-test:
    name: cargo test (terrain-codec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-test
          cache-targets: true
      - run: cargo test --manifest-path crates/terrain-codec/Cargo.toml --lib --release

  deploy:
    name: Deploy (Cloudflare Workers)
    needs: [build, cargo-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Use a GitHub Environment so the CLOUDFLARE_API_TOKEN can be scoped
    # to main-branch deploys and (optionally) gated by required reviewers.
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Reuse the same cache key as the build job so deploy can pick up
      # warm artifacts from the PR/main build that just passed.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: true

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build WASM
        run: npm run build:wasm

      # wrangler.toml pins account_id and the R2 bucket name, so the only
      # thing CI needs to supply is the API token. No config rewriting.
      - name: Wrangler deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
